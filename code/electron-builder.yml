appId: com.zgf.cmdhelper
productName: zgf的命令行辅助小工具
directories:
  output: ../release
files:
  - build/dist/**/*
  - build/dist-electron/**/*
  - build/node_modules/sql.js/**/*
  - build/node_modules/koffi/**/*
  - ../data.db
extraResources:
  - from: build/node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm
  - from: resources
    to: .
  - from: build/installer.nsh
    to: .
extraFiles:
  - from: ../data.db
    to: data.db
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: zgf的命令行辅助小工具
  artifactName: zgf-cmd-helper-Setup-${version}.exe
asar: true
