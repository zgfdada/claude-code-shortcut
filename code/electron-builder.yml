appId: com.zgf.cmdhelper
productName: zgf的命令行辅助小工具
electronVersion: 29.1.4
directories:
  output: ../release
files:
  - build/dist/**/*
  - build/dist-electron/**/*
  - build/node_modules/sql.js/**/*
  - build/node_modules/koffi/**/*
  - ../data.db
extraResources:
  - from: build/node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm
  - from: resources
    to: .
  - from: build/installer.nsh
    to: .
extraFiles:
  - from: ../data.db
    to: data.db
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.ico
  signAndEditExecutable: false
mac:
  target:
    - dmg
    - zip
  icon: resources/icons/icon.icns
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
  icon: resources/icons
  category: Development
  executableArgs:
    - --no-sandbox
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: zgf的命令行辅助小工具
  artifactName: zgf-cmd-helper-Setup-${version}.exe
asar: true
